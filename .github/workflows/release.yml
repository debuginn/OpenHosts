name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SCHEME: OpenHosts
  XCODE_VERSION: '26.0'

jobs:
  build-and-release:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BUILD_NUMBER=$(echo "$VERSION" | tr -d '.')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "actions" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "actions" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Setup App Store Connect API key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          echo "$ASC_API_KEY" > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -archivePath "$RUNNER_TEMP/OpenHosts.xcarchive" \
            -configuration Release \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Sign app bundle
        env:
          IDENTITY: "Developer ID Application"
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          APP="$RUNNER_TEMP/OpenHosts.xcarchive/Products/Applications/OpenHosts.app"

          # Resolve $(AppIdentifierPrefix) in helper entitlements
          sed "s/\$(AppIdentifierPrefix)/${TEAM_ID}./" \
            OpenHostsHelper/OpenHostsHelper.entitlements > "$RUNNER_TEMP/helper.entitlements"

          # Sign embedded frameworks (if any)
          if [ -d "$APP/Contents/Frameworks" ]; then
            find "$APP/Contents/Frameworks" \( -name "*.framework" -o -name "*.dylib" \) -exec \
              codesign --force --options runtime --sign "$IDENTITY" --timestamp {} \;
          fi

          # Sign the helper
          codesign --force --options runtime --sign "$IDENTITY" --timestamp \
            --entitlements "$RUNNER_TEMP/helper.entitlements" \
            "$APP/Contents/Library/LaunchDaemons/OpenHostsHelper"

          # Sign the widget extension
          codesign --force --options runtime --sign "$IDENTITY" --timestamp \
            --entitlements OpenHostsWidget/OpenHostsWidget.entitlements \
            "$APP/Contents/PlugIns/OpenHostsWidget.appex"

          # Sign the main app
          codesign --force --options runtime --sign "$IDENTITY" --timestamp \
            --entitlements OpenHosts/OpenHosts.entitlements \
            "$APP"

          # Verify
          codesign --verify --deep --strict "$APP"

          # Copy to export location
          mkdir -p "$RUNNER_TEMP/export"
          cp -R "$APP" "$RUNNER_TEMP/export/"

      - name: Check previous notarization history
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun notarytool history \
            --key "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" || true

      - name: Verify code signature
        run: |
          echo "=== App signature ==="
          codesign -dvvv "$RUNNER_TEMP/export/OpenHosts.app" 2>&1 || true
          echo ""
          echo "=== Widget signature ==="
          codesign -dvvv "$RUNNER_TEMP/export/OpenHosts.app/Contents/PlugIns/OpenHostsWidget.appex" 2>&1 || true
          echo ""
          echo "=== Helper signature ==="
          codesign -dvvv "$RUNNER_TEMP/export/OpenHosts.app/Contents/Library/LaunchDaemons/OpenHostsHelper" 2>&1 || true
          echo ""
          echo "=== Deep verify ==="
          codesign --verify --deep --strict --verbose=4 "$RUNNER_TEMP/export/OpenHosts.app" 2>&1 || true

      - name: Notarize app
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          ditto -c -k --keepParent "$RUNNER_TEMP/export/OpenHosts.app" "$RUNNER_TEMP/OpenHosts.zip"

          # Submit and capture submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/OpenHosts.zip" \
            --key "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 20m 2>&1) || true
          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
          echo "Submission ID: $SUBMISSION_ID"

          # Check status and get log
          if [ -n "$SUBMISSION_ID" ]; then
            echo "=== Submission info ==="
            xcrun notarytool info "$SUBMISSION_ID" \
              --key "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
              --key-id "$ASC_KEY_ID" \
              --issuer "$ASC_ISSUER_ID" || true
            echo "=== Submission log ==="
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
              --key-id "$ASC_KEY_ID" \
              --issuer "$ASC_ISSUER_ID" || true
          fi

          # Check if notarization was accepted
          echo "$SUBMIT_OUTPUT" | grep -q "status: Accepted" || {
            echo "::error::Notarization did not succeed"
            exit 1
          }

          xcrun stapler staple "$RUNNER_TEMP/export/OpenHosts.app"

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          create-dmg \
            --volname "OpenHosts" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "OpenHosts.app" 175 190 \
            --app-drop-link 425 190 \
            --hide-extension "OpenHosts.app" \
            "OpenHosts-${VERSION}.dmg" \
            "$RUNNER_TEMP/export/" \
          || true  # create-dmg returns 2 on success with background image warnings

          test -f "OpenHosts-${VERSION}.dmg"

      - name: Notarize DMG
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcrun notarytool submit "OpenHosts-${VERSION}.dmg" \
            --key "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 20m
          xcrun stapler staple "OpenHosts-${VERSION}.dmg"

      - name: Generate checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: shasum -a 256 "OpenHosts-${VERSION}.dmg" > "OpenHosts-${VERSION}.dmg.sha256"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$TAG" \
            "OpenHosts-${VERSION}.dmg" \
            "OpenHosts-${VERSION}.dmg.sha256" \
            --title "OpenHosts ${VERSION}" \
            --generate-notes

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/signing.keychain-db" 2>/dev/null || true
          rm -rf "$RUNNER_TEMP/private_keys" 2>/dev/null || true
