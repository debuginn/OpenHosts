name: OpenHosts
options:
  bundleIdPrefix: com.debuginn
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  OpenHosts:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenHosts
        createIntermediateGroups: true
      - path: OpenHosts/Resources
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.OpenHosts
        PRODUCT_NAME: OpenHosts
        INFOPLIST_FILE: OpenHosts/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenHosts/OpenHosts.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: SharedKit
      - target: OpenHostsHelper
        embed: false
      - target: OpenHostsWidget
        embed: true
        codeSign: true

  OpenHostsHelper:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenHostsHelper
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.OpenHosts.Helper
        PRODUCT_NAME: OpenHostsHelper
        INFOPLIST_FILE: OpenHostsHelper/Info.plist
        SKIP_INSTALL: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: OpenHostsHelper/OpenHostsHelper.entitlements
    dependencies:
      - package: SharedKit

  OpenHostsWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenHostsWidget
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.OpenHosts.Widget
        PRODUCT_NAME: OpenHostsWidget
        INFOPLIST_FILE: OpenHostsWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenHostsWidget/OpenHostsWidget.entitlements
    dependencies:
      - package: SharedKit

  SharedKitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SharedKitTests
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.OpenHostsTests
    dependencies:
      - package: SharedKit

packages:
  SharedKit:
    path: SharedKit
