name: iHostsTool
options:
  bundleIdPrefix: com.debuginn
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  iHostsTool:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: iHostsTool
        createIntermediateGroups: true
      - path: iHostsTool/Resources
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.iHostsTool
        PRODUCT_NAME: iHostsTool
        INFOPLIST_FILE: iHostsTool/Info.plist
        CODE_SIGN_ENTITLEMENTS: iHostsTool/iHostsTool.entitlements
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: SharedKit
      - target: iHostsHelper
        embed: false
      - target: iHostsWidget
        embed: true
        codeSign: true

  iHostsHelper:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: iHostsHelper
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.iHostsTool.Helper
        PRODUCT_NAME: iHostsHelper
        INFOPLIST_FILE: iHostsHelper/Info.plist
        SKIP_INSTALL: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: iHostsHelper/iHostsHelper.entitlements
    dependencies:
      - package: SharedKit

  iHostsWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: iHostsWidget
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.iHostsTool.Widget
        PRODUCT_NAME: iHostsWidget
        INFOPLIST_FILE: iHostsWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: iHostsWidget/iHostsWidget.entitlements
    dependencies:
      - package: SharedKit

  SharedKitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SharedKitTests
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.iHostsToolTests
    dependencies:
      - package: SharedKit

packages:
  SharedKit:
    path: SharedKit
