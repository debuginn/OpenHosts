name: OpenHosts
options:
  bundleIdPrefix: com.debuginn
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: TXVGDTDY84
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"

targets:
  OpenHosts:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenHosts
        excludes:
          - "Resources/LaunchDaemons/**"
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.OpenHosts
        PRODUCT_NAME: OpenHosts
        INFOPLIST_FILE: OpenHosts/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenHosts/OpenHosts.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: OpenHostsHelper
        embed: false
      - target: OpenHostsWidget
        embed: true
        codeSign: true
      - package: SharedKit
    postBuildScripts:
      - name: Copy LaunchDaemon files
        basedOnDependencyAnalysis: false
        script: |
          set -e
          LAUNCHER_DIR="${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Library/LaunchDaemons"
          mkdir -p "$LAUNCHER_DIR"
          cp -f "${SRCROOT}/OpenHosts/Resources/LaunchDaemons/com.debuginn.OpenHosts.Helper.plist" "$LAUNCHER_DIR/"
          if [ -f "${BUILT_PRODUCTS_DIR}/OpenHostsHelper" ]; then
            cp -f "${BUILT_PRODUCTS_DIR}/OpenHostsHelper" "$LAUNCHER_DIR/"
          fi

  OpenHostsHelper:
    type: tool
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenHostsHelper
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.OpenHosts.Helper
        PRODUCT_NAME: OpenHostsHelper
        INFOPLIST_FILE: OpenHostsHelper/Info.plist
        SKIP_INSTALL: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: OpenHostsHelper/OpenHostsHelper.entitlements

  OpenHostsWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: OpenHostsWidget
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.OpenHosts.Widget
        PRODUCT_NAME: OpenHostsWidget
        INFOPLIST_FILE: OpenHostsWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenHostsWidget/OpenHostsWidget.entitlements
    dependencies:
      - package: SharedKit

  SharedKitTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: SharedKitTests
        createIntermediateGroups: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.debuginn.OpenHostsTests
    dependencies:
      - package: SharedKit

schemes:
  OpenHosts:
    build:
      targets:
        OpenHosts: all
    run:
      config: Debug
    archive:
      config: Release

  OpenHostsWidget:
    build:
      targets:
        OpenHostsWidget: all
    run:
      config: Debug
      askForAppToLaunch: true

packages:
  SharedKit:
    path: SharedKit
